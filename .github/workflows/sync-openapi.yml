name: Sync OpenAPI spec

# Pull-based sync of the VerifyAX Gateway public OpenAPI spec.
# Runs on GitHub-hosted runners (open internet), so it can reach the gateway.
# Commits the mirror directly to the default branch when it changes.
#
# Direct-commit (not a PR) on purpose: org policy disables "Allow GitHub Actions
# to create and approve pull requests", so the default GITHUB_TOKEN can't open
# PRs. Pushing the mirror needs only `contents: write`, which a workflow can
# grant itself regardless of that setting. The provider configs (openai/, gemini/)
# still derive from this file in their own steps, so review happens there.

on:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC (off the :00 mark on purpose)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync spec from gateway
        run: scripts/sync-openapi.sh

      - name: Extract spec version
        id: ver
        run: |
          v=$(python3 -c "import yaml;print(yaml.safe_load(open('openapi/verifyax.yaml')).get('info',{}).get('version','unknown'))")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Commit mirror on drift
        run: |
          if git diff --quiet -- openapi/verifyax.yaml; then
            echo "No spec changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openapi/verifyax.yaml
          git commit -m "Sync OpenAPI spec (gateway v${{ steps.ver.outputs.version }})"
          git push
