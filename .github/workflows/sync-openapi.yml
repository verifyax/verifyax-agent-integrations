name: Sync OpenAPI spec

# Pull-based sync of the VerifyAX Gateway public OpenAPI spec, plus a rebuild of
# the provider artifacts derived from it (OpenAI Actions, Gemini functions).
# Runs on GitHub-hosted runners (open internet), so it can reach the gateway.
# Commits the mirror + regenerated artifacts directly to the default branch when
# they change, keeping derived files from going stale behind the mirror.
#
# Direct-commit (not a PR) on purpose: org policy disables "Allow GitHub Actions
# to create and approve pull requests", so the default GITHUB_TOKEN can't open
# PRs. Pushing needs only `contents: write`, which a workflow can grant itself
# regardless of that setting.

on:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC (off the :00 mark on purpose)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync spec from gateway
        run: scripts/sync-openapi.sh

      - name: Extract spec version
        id: ver
        run: |
          v=$(python3 -c "import yaml;print(yaml.safe_load(open('openapi/verifyax.yaml')).get('info',{}).get('version','unknown'))")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Rebuild derived provider artifacts
        run: |
          scripts/build-openai-actions.sh
          scripts/build-gemini-functions.sh

      - name: Commit drift
        run: |
          paths="openapi/verifyax.yaml openai/verifyax-actions.yaml gemini/verifyax-functions.json"
          if git diff --quiet -- $paths; then
            echo "No spec changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $paths
          git commit -m "Sync OpenAPI spec + rebuild provider artifacts (gateway v${{ steps.ver.outputs.version }})"
          git push
